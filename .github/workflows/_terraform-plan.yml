name: "Terraform Plan"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev, sit, prod)"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: "Plan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      TF_WORKING_DIR: environments/${{ inputs.environment }}

    steps:
      - name: Validate Secrets
        env:
          CHECK_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CHECK_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CHECK_SHARED_SUB: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
          CHECK_ENV_SUB: ${{ secrets.AZURE_ENV_SUBSCRIPTION_ID }}
          CHECK_FIREBASE: ${{ secrets.FIREBASE_CREDENTIAL_JSON }}
          CHECK_PASSWORD_HASH: ${{ secrets.PASSWORD_HASH }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          missing=()
          [ -z "$CHECK_CLIENT_ID" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "$CHECK_TENANT_ID" ] && missing+=("AZURE_TENANT_ID")
          [ -z "$CHECK_SHARED_SUB" ] && missing+=("AZURE_SHARED_SUBSCRIPTION_ID")
          if [ "$ENVIRONMENT" != "shared" ]; then
            [ -z "$CHECK_ENV_SUB" ] && missing+=("AZURE_ENV_SUBSCRIPTION_ID")
            [ -z "$CHECK_FIREBASE" ] && missing+=("FIREBASE_CREDENTIAL_JSON")
            [ -z "$CHECK_PASSWORD_HASH" ] && missing+=("PASSWORD_HASH")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_firebase_credential_json: ${{ secrets.FIREBASE_CREDENTIAL_JSON }}
          TF_VAR_password_hash: ${{ secrets.PASSWORD_HASH }}
        run: terraform plan -input=false -no-color -var-file=terraform.tfvars -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      # REQ-INF-205: assert no Cosmos SQL container is marked for replace/destroy.
      # Index-policy changes must be applied in place; container recreation would
      # destroy data. Pure ["create"] of a brand-new container is allowed.
      # Replace surfaces in Terraform plan JSON as actions == ["delete","create"]
      # (or contains "replace" in some provider versions). A standalone ["delete"]
      # is also blocked — explicit container removal must be done out-of-band.
      - name: Guardrail — no Cosmos container replacement
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform show -json tfplan \
            | jq -e '
                [
                  .resource_changes[]
                  | select(.type=="azurerm_cosmosdb_sql_container")
                  | select(.change.actions | contains(["delete"]) or contains(["replace"]))
                ] | length == 0
              ' >/dev/null \
            || { echo "::error::Cosmos container would be replaced or deleted. Aborting."; exit 1; }

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;

            const body = `### Terraform Plan - \`${{ inputs.environment }}\`

            <details>
            <summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
