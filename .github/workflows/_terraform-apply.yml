name: "Terraform Apply"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev, sit, prod)"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: "Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      TF_WORKING_DIR: environments/${{ inputs.environment }}

    steps:
      - name: Validate Secrets
        env:
          CHECK_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CHECK_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CHECK_SHARED_SUB: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
          CHECK_ENV_SUB: ${{ secrets.AZURE_ENV_SUBSCRIPTION_ID }}
          CHECK_FIREBASE: ${{ secrets.FIREBASE_CREDENTIAL_JSON }}
          CHECK_PASSWORD_HASH: ${{ secrets.PASSWORD_HASH }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          missing=()
          [ -z "$CHECK_CLIENT_ID" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "$CHECK_TENANT_ID" ] && missing+=("AZURE_TENANT_ID")
          [ -z "$CHECK_SHARED_SUB" ] && missing+=("AZURE_SHARED_SUBSCRIPTION_ID")
          if [ "$ENVIRONMENT" != "shared" ]; then
            [ -z "$CHECK_ENV_SUB" ] && missing+=("AZURE_ENV_SUBSCRIPTION_ID")
            [ -z "$CHECK_FIREBASE" ] && missing+=("FIREBASE_CREDENTIAL_JSON")
            [ -z "$CHECK_PASSWORD_HASH" ] && missing+=("PASSWORD_HASH")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Outputs
        run: terraform output -json
        working-directory: ${{ env.TF_WORKING_DIR }}
