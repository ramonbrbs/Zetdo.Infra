name: "Terraform Apply"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev, sit, prod)"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: "Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      TF_WORKING_DIR: environments/${{ inputs.environment }}

    steps:
      - name: Validate Secrets
        run: |
          missing=()
          [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "${{ secrets.AZURE_TENANT_ID }}" ] && missing+=("AZURE_TENANT_ID")
          [ -z "${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}" ] && missing+=("AZURE_SHARED_SUBSCRIPTION_ID")
          if [ "${{ inputs.environment }}" != "shared" ]; then
            [ -z "${{ secrets.AZURE_ENV_SUBSCRIPTION_ID }}" ] && missing+=("AZURE_ENV_SUBSCRIPTION_ID")
            [ -z "${{ secrets.FIREBASE_CREDENTIAL_JSON }}" ] && missing+=("FIREBASE_CREDENTIAL_JSON")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Outputs
        run: terraform output -json
        working-directory: ${{ env.TF_WORKING_DIR }}
