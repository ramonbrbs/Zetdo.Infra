name: "Terraform Apply"

# Required GitHub Actions environment-scoped secrets (per `dev` / `sit` / `prod`):
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SHARED_SUBSCRIPTION_ID, AZURE_ENV_SUBSCRIPTION_ID
#   - FIREBASE_CREDENTIAL_JSON, PASSWORD_HASH
#   - RECAPTCHA_SECRET (Zet-19 Bot Protection — see Infra/docs/zet-19-bot-protection.md).
#     If you instead use suffix-named repo secrets (RECAPTCHA_SECRET_DEV, etc.),
#     update the env: block on the apply job to map the right one per environment.

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev, sit, prod)"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: "Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      TF_WORKING_DIR: environments/${{ inputs.environment }}

    steps:
      - name: Validate Secrets
        env:
          CHECK_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CHECK_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CHECK_SHARED_SUB: ${{ secrets.AZURE_SHARED_SUBSCRIPTION_ID }}
          CHECK_ENV_SUB: ${{ secrets.AZURE_ENV_SUBSCRIPTION_ID }}
          CHECK_FIREBASE: ${{ secrets.FIREBASE_CREDENTIAL_JSON }}
          CHECK_PASSWORD_HASH: ${{ secrets.PASSWORD_HASH }}
          CHECK_RECAPTCHA_SECRET: ${{ secrets.RECAPTCHA_SECRET }}
          # Zet-21 Twilio Messaging
          CHECK_TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          CHECK_TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          CHECK_TWILIO_MESSAGING_SERVICE_SID: ${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          missing=()
          [ -z "$CHECK_CLIENT_ID" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "$CHECK_TENANT_ID" ] && missing+=("AZURE_TENANT_ID")
          [ -z "$CHECK_SHARED_SUB" ] && missing+=("AZURE_SHARED_SUBSCRIPTION_ID")
          if [ "$ENVIRONMENT" != "shared" ] && [ "$ENVIRONMENT" != "landing" ]; then
            [ -z "$CHECK_ENV_SUB" ] && missing+=("AZURE_ENV_SUBSCRIPTION_ID")
            [ -z "$CHECK_FIREBASE" ] && missing+=("FIREBASE_CREDENTIAL_JSON")
            [ -z "$CHECK_PASSWORD_HASH" ] && missing+=("PASSWORD_HASH")
            [ -z "$CHECK_RECAPTCHA_SECRET" ] && missing+=("RECAPTCHA_SECRET")
            [ -z "$CHECK_TWILIO_ACCOUNT_SID" ] && missing+=("TWILIO_ACCOUNT_SID")
            [ -z "$CHECK_TWILIO_AUTH_TOKEN" ] && missing+=("TWILIO_AUTH_TOKEN")
            [ -z "$CHECK_TWILIO_MESSAGING_SERVICE_SID" ] && missing+=("TWILIO_MESSAGING_SERVICE_SID")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        env:
          TF_VAR_firebase_credential_json: ${{ secrets.FIREBASE_CREDENTIAL_JSON }}
          TF_VAR_password_hash: ${{ secrets.PASSWORD_HASH }}
          # Zet-19 Bot Protection — see Infra/docs/zet-19-bot-protection.md
          TF_VAR_recaptcha_secret: ${{ secrets.RECAPTCHA_SECRET }}
          # Zet-21 Twilio Messaging
          TF_VAR_twilio_account_sid: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TF_VAR_twilio_messaging_service_sid: ${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Outputs
        run: terraform output -json
        working-directory: ${{ env.TF_WORKING_DIR }}
